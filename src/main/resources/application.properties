# Server
server.port=8080
server.servlet.context-path=/apiv1

# Database H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA & Timezone
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# Seguridad: Evitar que Spring mande el JSON de error por defecto con el trace
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# DevTools
spring.devtools.add-properties=true
# Reduce el ruido de logs de validación en la consola
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR