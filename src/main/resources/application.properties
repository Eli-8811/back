# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# DATABASE (H2 IN-MEMORY)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Esto permite ver la consola H2 si usas un navegador
spring.h2.console.settings.web-allow-others=true

# ===============================
# JPA & HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# ===============================
# LOGGING CONFIGURATION
# ===============================
# Niveles de Log por paquete
logging.level.root=INFO
logging.level.com.core.back=INFO
# Corregido el typo: era 'back', no 'bac'
logging.level.com.core.back.service=DEBUG 
# Opcional: ver parámetros de las queries SQL
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Salida a archivo
logging.file.name=logs/back.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=100MB

# Formato de salida en consola (opcional para mejor lectura)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n